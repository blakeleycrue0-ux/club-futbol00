<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Femenino Santa Ponsa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    background:black;
    color:white;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:85px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 35px;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

/* 🔥 LOGO ARREGLADO */
.logo{
    height:45px;
    max-height:45px;
    width:auto;
    object-fit:contain;
    display:block;
}

.club-name{
    font-family:'Montserrat', sans-serif;
    font-size:28px;
    font-weight:900;
    text-transform:uppercase;
}

.nav-desktop{
    display:flex;
    gap:30px;
}

.nav-desktop a{
    color:white;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
}

.user-area{
    font-weight:700;
    cursor:pointer;
}

.menu-icon{
    display:none;
    font-size:28px;
    cursor:pointer;
}

.mobile-menu{
    position:fixed;
    top:85px;
    left:0;
    width:100%;
    background:#000;
    display:none;
    flex-direction:column;
    padding:20px;
    gap:15px;
    border-top:1px solid rgba(255,255,255,0.1);
    z-index:999;
}

.mobile-menu a{
    color:white;
    text-decoration:none;
    font-weight:700;
    text-transform:uppercase;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 8%;

    background:
    linear-gradient(to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.55) 60%,
        rgba(0,0,0,0.95) 100%
    ),
    url("https://images.unsplash.com/photo-1574629810360-7efbbe195018");

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Montserrat', sans-serif;
    font-size:70px;
    font-weight:900;
    text-transform:uppercase;
}

/* TITULOS */
.section-title{
    padding:60px 30px 10px;
}

.section-title h2{
    font-family:'Montserrat', sans-serif;
    font-size:42px;
    font-weight:900;
    text-transform:uppercase;
}

/* PARTIDOS */
.matches-section{
    background:#000;
    padding-bottom:40px;
}

.matches-scroll{
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding:20px 30px 50px;
}

.matches-scroll::-webkit-scrollbar{
    display:none;
}

.match-card{
    min-width:320px;
    background:#111;
    padding:25px;
    flex-shrink:0;
    transition:0.3s;
    border-radius:0;
    position:relative;
    overflow:hidden;
}

.match-card:hover{
    transform:translateY(-8px);
}

/* 🔥 CORTE LIMPIO ESQUINA */
.match-card::after{
    content:"";
    position:absolute;
    bottom:-1px;
    right:-1px;
    width:140px;
    height:140px;
    background: linear-gradient(
        135deg,
        transparent 49%,
        #000 50%
    );
    pointer-events:none;
}

.competition{
    color:#888;
    font-size:12px;
    font-weight:700;
    letter-spacing:2px;
}

.teams{
    margin-top:20px;
}

.teams h3{
    font-size:22px;
    font-weight:800;
    margin:10px 0;
}

.score{
    font-size:38px;
    font-weight:900;
    margin:15px 0;
}

/* NEWS */
.news-section{
    background:black;
    padding-bottom:80px;
}

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    padding:20px 30px;
}

.news-card{
    background:#111;
    overflow:hidden;
    transition:0.3s;
    border-radius:0;
}

.news-card:hover{
    transform:translateY(-8px);
}

.news-card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.news-content{
    padding:20px;
}

.news-content span{
    color:#888;
    font-size:12px;
    font-weight:700;
    letter-spacing:2px;
}

.news-content h3{
    margin-top:12px;
    font-size:24px;
    font-weight:800;
}

/* MOBILE */
@media(max-width:768px){

    .nav-desktop{
        display:none;
    }

    .menu-icon{
        display:block;
    }

    .hero h1{
        font-size:42px;
    }
}

</style>
</head>

<body>

<header>

    <div class="header-left">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <img src="./Logoclub.png" class="logo">
        <div class="club-name">FEMENINO</div>
    </div>

    <nav class="nav-desktop">
        <a href="#">Noticias</a>
        <a href="#">Equipos</a>
        <a href="#">Tienda</a>
    </nav>

    <div class="user-area" onclick="goLogin()">SIGN IN</div>

</header>

<div class="mobile-menu" id="mobileMenu">
    <a href="#">Noticias</a>
    <a href="#">Equipos</a>
    <a href="#">Tienda</a>
</div>

<section class="hero">
    <h1>FEMENINO<br>SANTA PONSA</h1>
</section>

<!-- PARTIDOS -->
<section class="matches-section">

    <div class="section-title">
        <h2>Últimos partidos</h2>
    </div>

    <div class="matches-scroll">

        <div class="match-card">
            <span class="competition">LIGA</span>
            <div class="teams">
                <h3>Santa Ponsa</h3>
                <div class="score">3 - 1</div>
                <h3>Atlético Baleares</h3>
            </div>
        </div>

        <div class="match-card">
            <span class="competition">COPA</span>
            <div class="teams">
                <h3>Santa Ponsa</h3>
                <div class="score">2 - 0</div>
                <h3>Son Sardina</h3>
            </div>
        </div>

    </div>

</section>

<!-- NEWS -->
<section class="news-section">

    <div class="section-title">
        <h2>Noticias</h2>
    </div>

    <div class="news-grid">

        <div class="news-card">
            <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018">
            <div class="news-content">
                <span>INFANTIL</span>
                <h3>Victoria importante del equipo</h3>
            </div>
        </div>

        <div class="news-card">
            <img src="https://images.unsplash.com/photo-1518604666860-9ed391f76460">
            <div class="news-content">
                <span>CLUB</span>
                <h3>Convocatoria del fin de semana</h3>
            </div>
        </div>

    </div>

</section>

<script>

function toggleMenu(){
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", function(e){
    const menu = document.getElementById("mobileMenu");
    const icon = document.querySelector(".menu-icon");

    if(!menu.contains(e.target) && !icon.contains(e.target)){
        menu.style.display = "none";
    }
});

function goLogin(){
    window.location.href = "login.html";
}

</script>

</body>
</html>

</body>
</html>
