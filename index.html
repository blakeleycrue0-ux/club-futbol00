<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Femenino Santa Ponsa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    background:black;
    color:white;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:85px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 35px;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* LEFT */
.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    height:55px;
    width:auto;
    object-fit:contain;
    display:block;
}

.club-name{
    font-family:'Montserrat', sans-serif;
    font-size:28px;
    font-weight:900;
    text-transform:uppercase;
}

/* NAV DESKTOP */
.nav-desktop{
    display:flex;
    gap:30px;
}

.nav-desktop a{
    color:white;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
}

/* USER */
.user-area{
    font-weight:700;
    cursor:pointer;
}

/* HAMBURGER */
.menu-icon{
    display:none;
    font-size:28px;
    cursor:pointer;
}

/* MOBILE MENU */
.mobile-menu{
    position:fixed;
    top:85px;
    left:0;
    width:100%;
    background:#000;
    display:none;
    flex-direction:column;
    padding:20px;
    gap:15px;
    border-top:1px solid rgba(255,255,255,0.1);
    z-index:999;
}

.mobile-menu a{
    color:white;
    text-decoration:none;
    font-weight:700;
    text-transform:uppercase;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 8%;
    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1574629810360-7efbbe195018");
    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Montserrat', sans-serif;
    font-size:70px;
    font-weight:900;
    text-transform:uppercase;
}

/* MATCHES */
.matches-section{
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2");
    background-size:cover;
    background-position:center;
    padding:100px 0;
}

.matches-scroll{
    display:flex;
    gap:25px;
    overflow-x:auto;
    padding:30px;
    scroll-snap-type:x mandatory;
}

.matches-scroll::-webkit-scrollbar{
    display:none;
}

/* CARD */
.match-card.big{
    min-width:340px;
    height:200px;
    background:rgba(17,17,17,0.75);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    padding:25px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    scroll-snap-align:start;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}

.match-card.big:hover{
    transform:translateY(-8px);
}

/* CORTE PSG LIMPIO */
.match-card.big::after{
    content:"";
    position:absolute;
    bottom:-40px;
    left:-10%;
    width:120%;
    height:80px;
    background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.9), #000);
    transform:rotate(-5deg);
    pointer-events:none;
}

/* TEXT */
.match-card.big h3{
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
}

.match-card.big p{
    color:#ccc;
}

.match-card.big .score{
    font-size:30px;
    font-weight:900;
}

/* MOBILE */
@media(max-width:768px){

    .nav-desktop{
        display:none;
    }

    .menu-icon{
        display:block;
    }

    .hero h1{
        font-size:42px;
    }
}

</style>
</head>

<body>

<header>

    <div class="header-left">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <img src="./Logoclub.png" class="logo" alt="logo">
        <div class="club-name">FEMENINO</div>
    </div>

    <nav class="nav-desktop">
        <a href="#">Noticias</a>
        <a href="#">Equipos</a>
        <a href="#">Tienda</a>
    </nav>

    <div class="user-area" id="user" onclick="goLogin()">SIGN IN</div>

</header>

<div class="mobile-menu" id="mobileMenu">
    <a href="#">Noticias</a>
    <a href="#">Equipos</a>
    <a href="#">Tienda</a>
</div>

<section class="hero">
    <h1>FEMENINO<br>SANTA PONSA</h1>
</section>

<section class="matches-section">

<h2>Partidos</h2>

<div class="matches-scroll">

    <div class="match-card big">
        <h3>SP vs Palma</h3>
        <p>Amistoso</p>
        <div class="score">3 - 1</div>
    </div>

    <div class="match-card big">
        <h3>SP vs Barça B</h3>
        <p>Liga</p>
        <div class="score">2 - 2</div>
    </div>

</div>

</section>

<script>

function toggleMenu(){
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", function(e){
    const menu = document.getElementById("mobileMenu");
    const icon = document.querySelector(".menu-icon");

    if(!menu.contains(e.target) && !icon.contains(e.target)){
        menu.style.display = "none";
    }
});

function goLogin(){
    window.location.href = "login.html";
}

</script>

</body>
</html>
